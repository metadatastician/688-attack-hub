# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Publish the playable bundle to GitHub Pages.
#
# The game is a single self-contained HTML file with no dependencies, so the
# "site" is that file served as index.html. Neither of this estate's own
# static-site generators (ddraig-ssg, casket-ssg) applies here: both turn
# Markdown into a multi-page site, and this artefact has no Markdown content
# to render — it is one pre-built interactive page. There is nothing to build.
#
# This workflow does NOT run on pull requests, deliberately — deploying a PR
# to the live site would publish unreviewed content.
#
# ── Why the artifact is packed by hand ───────────────────────────────────────
# The obvious step here is actions/upload-pages-artifact. It cannot be used in
# this organisation: it internally calls actions/upload-artifact@v4 by TAG,
# and the org requires every action — including transitive ones — to be pinned
# to a full-length commit SHA. Using it fails at startup with an
# unpinned-transitive-action error, and startup_failure is the worst kind of
# red because it reads as a check that never ran rather than one that failed.
#
# So the two things upload-pages-artifact does are done explicitly below:
# build the deterministic tarball it would have built, and upload it under the
# artifact name `github-pages` that actions/deploy-pages expects. Every
# `uses:` here is SHA-pinned, and there are no transitive action calls left to
# violate the policy. (Matches the pattern already proven working in
# metadatastician/f19-stealth-glider's pages.yml.)

name: pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel an in-flight deployment; let it finish and queue the next.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: assemble site
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Assemble the site from the committed bundle
        run: |
          set -euo pipefail
          test -f 688-attack-hub.html
          mkdir -p _site
          cp 688-attack-hub.html _site/index.html
          cp 688-attack-hub.html _site/688-attack-hub.html
          mkdir -p _site/.well-known
          cp .well-known/*.txt _site/.well-known/
          # Bypass Jekyll — this is a plain static file, not a Jekyll source tree.
          touch _site/.nojekyll
          echo "site assembled ($(wc -c < _site/index.html) bytes)"

      # Exactly what actions/upload-pages-artifact packs, done inline so no
      # unpinned transitive action is involved. Deploy expects a single
      # artifact.tar at the root of an artifact named `github-pages`.
      - name: Pack the Pages artifact
        run: |
          set -euo pipefail
          tar \
            --dereference --hard-dereference \
            --directory _site \
            -cvf "${RUNNER_TEMP}/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            .
          echo "packed $(wc -c < "${RUNNER_TEMP}/artifact.tar") bytes"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    name: deploy to github-pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
