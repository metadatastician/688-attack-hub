# SPDX-License-Identifier: MPL-2.0
#
# {{PROJECT_NAME}} selur-compose configuration
#
# Orchestrates the container stack as verified container bundles (.ctp).
# Uses selur zero-copy IPC between services on the same host.
#
# Usage:
#   selur-compose up                     # Start all services
#   selur-compose up --detach            # Start in background
#   selur-compose verify                 # Verify all .ctp signatures
#   selur-compose ps                     # Check status
#   selur-compose logs -f {{SERVICE_NAME}}  # Stream logs
#   selur-compose down                   # Stop all services
#
# Fallback (when selur is not installed): this TOML is selur-native and is
# NOT parseable by `podman compose` / `docker compose`. For the portable
# (podman/nerdctl/docker) path use the compose-spec file instead:
#   podman compose -f ../compose.yaml up -d        # (or: just container-up)

version = "1.0"

# ============================================================================
# Services
# ============================================================================

# Primary application service
[services.{{SERVICE_NAME}}]
image = "{{REGISTRY}}/{{SERVICE_NAME}}:latest.ctp"
ports = ["{{PORT}}:{{PORT}}"]
environment = {
  APP_HOST = "[::]",
  APP_PORT = "{{PORT}}",
  APP_LOG_FORMAT = "json",
  APP_DATA_DIR = "/data",
}
volumes = ["{{SERVICE_NAME}}-data:/data"]
restart = "always"
healthcheck = { test = "curl -sf http://localhost:{{PORT}}/health", interval = "30s", timeout = "5s", retries = 3 }

# Rokur secrets gate: refuses to start (and refuses to proxy) unless the
# declared secrets are present; emits a structured audit log of every access.
# Sits between svalinn and the application. Remove if you do not gate secrets.
[services.rokur]
image = "ghcr.io/hyperpolymath/rokur:latest.ctp"
ports = ["8081:8081"]
environment = {
  ROKUR_BACKEND = "http://{{SERVICE_NAME}}:{{PORT}}",
  ROKUR_LISTEN = "[::]:8081",
  ROKUR_REQUIRED_SECRETS = "",
  ROKUR_AUDIT_LOG = "/var/log/rokur/audit.jsonl",
  ROKUR_LOG_FORMAT = "json",
}
volumes = ["rokur-audit:/var/log/rokur"]
depends_on = ["{{SERVICE_NAME}}"]
restart = "always"
healthcheck = { test = "curl -sf http://localhost:8081/health", interval = "30s", timeout = "5s", retries = 3 }

# Svalinn edge gateway: validates requests, enforces policies, TLS termination.
# Proxies to rokur, which in turn fronts the application.
[services.svalinn]
image = "ghcr.io/hyperpolymath/svalinn:latest.ctp"
ports = ["443:443", "80:80"]
environment = {
  SVALINN_BACKEND = "http://rokur:8081",
  SVALINN_POLICY_FILE = "/etc/svalinn/gatekeeper.yaml",
  SVALINN_TLS_AUTO = "true",
}
volumes = ["svalinn-config:/etc/svalinn:ro"]
depends_on = ["rokur"]
restart = "always"
healthcheck = { test = "curl -sf http://localhost:80/health", interval = "30s", timeout = "5s", retries = 3 }

# ============================================================================
# Volumes
# ============================================================================

[volumes.{{SERVICE_NAME}}-data]
driver = "local"

[volumes.rokur-audit]
driver = "local"

[volumes.svalinn-config]
driver = "local"

# ============================================================================
# Networks
# ============================================================================

# Use selur zero-copy IPC for inter-service communication on the same host.
# Falls back to standard bridge networking when selur driver is unavailable.
[networks.default]
driver = "selur"
